name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node & build frontend
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Install Python deps
        run: uv sync

      - name: Build .app with PyInstaller
        run: uv run pyinstaller bench-manager.spec --clean

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          mkdir -p installer/mac
          create-dmg \
            --volname "Bench Manager" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Bench Manager.app" 150 180 \
            --hide-extension "Bench Manager.app" \
            --app-drop-link 450 180 \
            --no-internet-enable \
            "installer/mac/Bench-Manager-${{ github.ref_name }}.dmg" \
            "dist/Bench Manager.app"

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: installer/mac/Bench-Manager-${{ github.ref_name }}.dmg
          generate_release_notes: true
